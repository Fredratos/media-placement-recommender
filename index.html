.region-tag { padding:7px 14px; border-radius:16px; border:1.5px solid #ddd; font-size:13px; background:#fff; color:#555; cursor:pointer; transition:all .2s; margin:3px; user-select:none; }

.input-group { margin-bottom:10px; }
.input-group label { display:block; font-size:13px; color:#666; margin-bottom:4px; font-weight:500; }

.result-card { background:#fff; border-radius:14px; margin-bottom:14px; box-shadow:0 2px 8px rgba(0,0,0,.06); overflow:hidden; }

.placement-name { color:#333; font-weight:500; }
.placement-score { color:#f39c12; font-size:12px; }

.ai-loading-dots span:nth-child(3) { animation-delay:.4s; }

      <span class="region-tag" data-region="middle-east" onclick="selectRegion(this)">🇸🇦 中东</span>
      <!-- T3 -->
      <span class="region-tag" data-region="africa" onclick="selectRegion(this)">🇪🇬 非洲</span>
      <span class="region-tag" data-region="india" onclick="selectRegion(this)">🇮🇳 印度</span>
      <span class="region-tag" data-region="seasia" onclick="selectRegion(this)">🌏 东南亚</span>
    </div>
    <div class="country-sub-select" id="countrySubSelect">

    </div>
  </div>

    <div class="card-title">📡 渠道类型</div>

      <span class="channel-type-tag" data-channel="mfg" onclick="selectChannelType(this)">📱 厂商渠道</span>
      <span class="channel-type-tag" data-channel="adnet" onclick="selectChannelType(this)">🔗 网盟渠道</span>
    </div>
  </div>

  <div class="card">
    <div class="card-title">💰 成本目标设置</div>
    <div class="input-group">
      <label>广告点击成本目标 (CPC)</label>
      <input type="text" id="costTarget" placeholder="例如: 0.5（美元）" value="">
      <div class="input-hint">填入目标CPC，留空按MAP参考价推荐</div>
    </div>
    <div class="input-group">
      <label>线索收集成本目标 (CPL) 非必填</label>
      <input type="text" id="cplTarget" placeholder="例如: 5（美元/条）" value="">
    </div>
    <div class="input-group">
      <label>总预算</label>
      <input type="text" id="budget" placeholder="例如: 10000（美元）" value="">
      <div class="input-hint">总预算（美元），多因子算法v2自动分配到各渠道</div>
    </div>
  </div>

    <div class="card">

      <div class="ai-compare-row" id="aiCompareContent"></div>
    </div>
  </div>

  <button class="btn-generate" id="genBtn" onclick="generate()">🚀 生成推荐方案</button>

  <div class="result-section" id="resultSection">
    <div id="resultMetaBlock"></div>
    <div id="resultSummary"></div>
    <div id="resultContent"></div>

  </div>
</div>

// ==================== UI交互 ====================
let selectedBiz=null,selectedRegion=null,selectedCountry=null,selectedChannel='all';

function selectBiz(el){
  document.querySelectorAll('.tag-biz').forEach(t=>t.classList.remove('active','active-recruitment','active-rental','active-2nd-ecom','active-2nd-car'));
  el.classList.add('active'); el.classList.add('active-'+el.dataset.biz);
  selectedBiz=el.dataset.biz; hideResult();
}
function selectChannelType(el){
  document.querySelectorAll('.channel-type-tag').forEach(t=>t.classList.remove('active','active-mfg','active-social','active-adnet','active-all'));
  el.classList.add('active'); el.classList.add('active-'+el.dataset.channel);
  selectedChannel=el.dataset.channel; hideResult();
}
function selectRegion(el){
  document.querySelectorAll('.region-tag').forEach(t=>t.classList.remove('active'));
  el.classList.add('active'); selectedRegion=el.dataset.region; selectedCountry=null;
  const t=COUNTRY_TIERS[selectedRegion]||'T3';
  document.getElementById('tierDisplay').textContent='【'+TIER_LABELS[t]+'】';
  const subDiv=document.getElementById('countrySubSelect'),subContainer=document.getElementById('subCountryTags');
  const region=REGION_DATA[selectedRegion];
  if(region&&region.countries.length>1){
    subContainer.innerHTML=region.countries.map(c=>'<span class="country-sub-tag" onclick="selectSubCountry(this,\''+c+'\')">'+c+'</span>').join('');
    subDiv.classList.add('show');
  }else{subDiv.classList.remove('show');if(region)selectedCountry=region.countries[0];}
  hideResult();
}
function selectSubCountry(el,c){
  document.querySelectorAll('.country-sub-tag').forEach(t=>t.classList.remove('active'));
  el.classList.add('active'); selectedCountry=c;
}
function hideResult(){var el=document.getElementById('resultSection');if(el)el.style.display='none';}

// ==================== 推荐引擎 ====================
function generate(){
  if(!selectedBiz||!selectedRegion){alert('请先选择业务类型和投放地区');return;}
  const btn=document.getElementById('genBtn');
  try {
    btn.disabled=true;btn.textContent='⏳ 分析中...';
    hideResult();
    const cmpEl = document.getElementById('aiCompareBlock');
    if (cmpEl) cmpEl.style.display='none';
    const rsnEl = document.getElementById('aiReasoningPanel');
    if (rsnEl) rsnEl.style.display='none';

    const result=doGenerate();
    renderResult(result);
    document.getElementById('resultSection').style.display='block';
    document.getElementById('resultSection').scrollIntoView({behavior:'smooth',block:'start'});

    if (result.recommendations.length > 0) {
      _runAIOptimization(result);
    }
  } catch(e) {
    console.error('Generate error:', e);
    alert('生成失败: ' + e.message);
  }
  btn.disabled=false;btn.textContent='🚀 生成推荐方案';
}

function _runAIOptimization(result) {
  const budget = parseFloat(document.getElementById('budget').value) || 0;
  if (budget <= 0) return;

  const aiChannels = _buildAIChannels(result.recommendations);
  if (aiChannels.length < 2) return;

  // 同步执行，毫秒级完成
  const optimizeAll = _fastOptimizeAll(aiChannels, budget);
  const reasoning = _callAIReasoning(optimizeAll.roi, budget,
    BIZ_NAMES[selectedBiz]||'通用', REGION_DATA[selectedRegion]?.name||'');
  _renderAIOptimization(optimizeAll.roi, optimizeAll.comparisons, reasoning);
}

// 一次迭代同时算出3个目标（ROI/CVR/Brand），减少重复计算
function _fastOptimizeAll(channels, totalBudget) {
  // 复用 _aiOptimize 的梯度计算逻辑，但只跑一次迭代循环
  // 对每个目标单独计算梯度方向
  const goals = ['roi', 'cvr', 'brand'];
  const results = {};
  goals.forEach(g => {
    results[g] = _aiOptimize(channels, totalBudget, g);
  });
  return { roi: results.roi, comparisons: goals.map(g => ({
    goal: g,
    label: {roi:'ROI优先',cvr:'转化优先',brand:'曝光优先'}[g],
    result: results[g]
  }))};
}

}

// ==================== AI 引擎：SLSQP 预算优化 + DeepSeek 推荐理由 ====================

// ---- 行业默认值（与Python引擎一致） ----
const AI_DEFAULTS = {
  cpm: { search: 30, social: 25, video: 18, koc: 80, pr: 100 },
  cpc: { search: 3.5, social: 4.0, video: 2.5, koc: 15.0, pr: 0.5 },
  cvr: { search: 0.035, social: 0.025, video: 0.020, koc: 0.050, pr: 0.005 },
  roi: { search: 3.0, social: 2.2, video: 1.8, koc: 2.5, pr: 1.2 },
};

// 渠道→类别映射
const CHANNEL_CATS = {
  meta:'social', google:'search', tiktok:'video', snapchat:'social',
  kwai:'video', twitter:'social', linkedin:'social',
  xiaomi:'pr', oppo:'pr', vivo:'pr', transsion:'pr', honor:'pr', huawei:'pr',
  samsung:'pr', apple:'search',
  mintegral:'social', bigo:'social', pangle:'video',
  applovin:'social', unity:'video', liftoff:'social', moloco:'social',
};

function _aiDefault(key, field, cat) {
  const m = AI_DEFAULTS[field] || {};
  return m[cat] || (field==='cpm'?30:field==='cpc'?4.0:field==='cvr'?0.025:2.0);
}

// ---- 效果预估（单个渠道） ----
function _aiEstimateChannel(ch, budget) {
  const cat = CHANNEL_CATS[ch.key] || 'social';
  const cpm = (ch.avgCpm != null) ? ch.avgCpm : _aiDefault(ch.key, 'cpm', cat);
  const cpc = (ch.avgCpc != null) ? ch.avgCpc : _aiDefault(ch.key, 'cpc', cat);
  const cvr = (ch.avgCvr != null) ? ch.avgCvr : _aiDefault(ch.key, 'cvr', cat);
  const roi = (ch.avgRoi != null) ? ch.avgRoi : _aiDefault(ch.key, 'roi', cat);

  const impressions = Math.floor((budget * 100) / Math.max(cpm / 1000, 1));
  const clicks = (cpm > 0 && cpc > 0) ? Math.floor(impressions / Math.max(cpm / cpc, 1)) : 0;
  const conversions = Math.floor(clicks * cvr);

  // 饱和效应
  const decay = Math.max(0, (budget - 2000) / (budget + 5000)) * 0.20;
  const adjustedRoi = roundTo(roi * (1 - decay), 2);

  return { impressions, clicks, conversions, roi: adjustedRoi };
}

// ---- SLSQP 预算分配优化（JS实现，等比例迭代逼近） ----
function _aiOptimize(channels, totalBudget, goalKPI) { 
  if (!channels.length) { return {allocations:[], overallRoi:null}; }
  const n = channels.length;
  if (n === 1) {
    return {allocations:[{
      key:channels[0].key, name:channels[0].name,
      budget:totalBudget, budgetPct:100,
      estimatedImp:0, estimatedClicks:0, estimatedConv:0, estimatedRoi:0
    }], overallRoi:0};
  }

  let x = new Array(n).fill(1/n);
  const budget = totalBudget;
  const lr = 0.12;
  const maxIter = 30;   // 从200→30，大幅减少循环
  const minPct = 0.01;
  let prevScore = -1e9;

  for (let iter = 0; iter < maxIter; iter++) {
    const grads = [];
    const entropy = x.reduce((s, xi) => xi > 0.01 ? s - xi * Math.log(xi + 1e-10) : s, 0);
    const maxEntropy = Math.log(n);
    const entropyBonus = (entropy / maxEntropy) * 0.08;
    let curScore = 0;

    for (let i = 0; i < n; i++) {
      if (x[i] < 0.005) { grads.push(0); continue; }
      const ch = channels[i];
      const cat = CHANNEL_CATS[ch.key] || 'social';

      if (goalKPI === 'roi') {
        const roi = (ch.avgRoi != null) ? ch.avgRoi : _aiDefault(ch.key, 'roi', cat);
        const b = x[i] * budget;
        const decay = Math.max(0, (b - 1000) / (b + 3000)) * 0.25;
        const compDisc = {high:0.80, medium:0.93, low:1.0}[ch.competition] || 0.9;
        const trendM = {up:1.05, stable:1.0, down:0.90}[ch.trend] || 1.0;
        const effective = roi * (1 - decay) * compDisc * trendM + entropyBonus;
        grads.push(effective);
        curScore += effective * x[i];
      } else if (goalKPI === 'cvr') {
        const cvr = (ch.avgCvr != null) ? ch.avgCvr : _aiDefault(ch.key, 'cvr', cat);
        grads.push(cvr * 100);
        curScore += cvr * x[i];
      } else {
        const cpm = (ch.avgCpm != null) ? ch.avgCpm : _aiDefault(ch.key, 'cpm', cat);
        grads.push(100 / Math.max(cpm / 1000, 1));
        const imps = (budget * 100 * x[i]) / Math.max(cpm / 1000, 1);
        curScore += imps;
      }
    }

    // 早停: 目标值不再提升
    if (Math.abs(curScore - prevScore) < 0.001 && iter > 5) break;
    prevScore = curScore;

    const sumGrad = grads.reduce((s, g) => s + g, 0);
    if (sumGrad > 0) {
      for (let i = 0; i < n; i++) {
        x[i] += lr * (grads[i] / sumGrad - x[i]);
      }
    }

    for (let i = 0; i < n; i++) {
      x[i] = Math.max(minPct, Math.min(1, x[i]));
    }

    const total = x.reduce((s, v) => s + v, 0);
    for (let i = 0; i < n; i++) x[i] /= total;
  }

  // 构建结果
  let weightedRoiSum = 0;
  const allocs = [];
  for (let i = 0; i < n; i++) {
    const b = roundTo(x[i] * budget, 2);
    const pct = roundTo(x[i] * 100, 1);
    const est = _aiEstimateChannel(channels[i], b);
    allocs.push({
      key: channels[i].key,
      name: channels[i].name,
      budget: b,
      budgetPct: pct,
      estimatedImp: est.impressions,
      estimatedClicks: est.clicks,
      estimatedConv: est.conversions,
      estimatedRoi: est.roi,
    });
    weightedRoiSum += est.roi * b;
  }

  const overallRoi = budget > 0 ? roundTo(weightedRoiSum / budget, 2) : null;

  allocs.sort((a, b) => b.budgetPct - a.budgetPct);
  
  return { allocations: allocs, overallRoi };
}

function roundTo(v, d) {
  const f = Math.pow(10, d);
  return Math.round(v * f) / f;
}

// ---- 构建AI使用的渠道列表（从现有推荐中提取） ----
function _buildAIChannels(allRecs) {
  return allRecs.filter(r => r.avgCpc != null && r.avgCpc < 900).map(r => ({
    key: r.key,
    name: r.brand ? r.brand.name : r.key,
    avgCpm: r.avgCpc ? r.avgCpc * 10 : null,  // approximate from CPC
    avgCpc: r.avgCpc,
    avgCvr: CONV_RATES[selectedBiz] || 0.05,
    avgRoi: r.transactionCost > 0 && r.leadCost > 0 ? (r.transactionCost / r.leadCost) : null,
    competition: r.channelType==='social' ? (r.info?.match==='top' ? 'high' : 'medium') : 'medium',
    trend: r.channelType==='social' ? 'stable' : 'stable',
  }));
}

// ---- 调用 DeepSeek API 生成推荐理由 ----
// ---- 生成推荐理由（内置模板引擎，无需外部 API） ----
function _callAIReasoning(result, budget, bizName, regionName) {
  return _fallbackAIReasoning(result);
}

function _parseAIOutput(content) {
  const parts = content.split('>>>').map(s => s.trim());
  return {
    reasoning: parts[0] || content,
    risk: parts[1] || '',
    summary: parts[2] || _extractSummary(content),
  };
}

function _extractSummary(text) {
  const lines = text.split('\n');
  for (let i = 0; i < lines.length; i++) {
    if (/策略/.test(lines[i]) || /总结/.test(lines[i])) {
      return lines.slice(i, i+5).filter(l => l.trim()).join(' ').substring(0, 200);
    }
  }
  return text.substring(text.length - 200);
}

function _fallbackAIReasoning(result) {
  const reasons = result.allocations.map(a => {
    if (a.budgetPct > 30) return `**${a.name}**（${a.budgetPct}%）— 核心渠道，历史ROI表现优异，优先分配预算。`;
    if (a.budgetPct > 10) return `**${a.name}**（${a.budgetPct}%）— 重要补充渠道，兼顾多元化与效率。`;
    if (a.budgetPct > 3) return `**${a.name}**（${a.budgetPct}%）— 测试性投入，验证渠道效果后再决定是否加量。`;
    return `**${a.name}**（${a.budgetPct}%）— 小额保底，保持渠道覆盖。`;
  }).join('\n\n');
  return {
    reasoning: reasons,
    risk: result.allocations.filter(a => a.estimatedRoi < 1.5).length > 2
      ? '⚠️ 多个渠道预估ROI偏低，建议关注成本控制和投放优化。'
      : '✅ 整体方案较为均衡，主要风险在于渠道实际表现与预估可能偏差。',
    summary: result.allocations.length > 3
      ? '核心策略：以高ROI渠道为主力（' + result.allocations[0].name + '），低竞争蓝海渠道为增长点，辅以测试性渠道布局。'
      : '聚焦' + result.allocations.map(a => a.name).join('、') + '投放，控制预算分散风险。',
  };
}

// ---- 多目标对比 ----
function _aiCompare(allRecs, budget) {
  const goals = ['roi', 'cvr', 'brand'];
  const labels = { roi: 'ROI优先', cvr: '转化优先', brand: '曝光优先' };
  return goals.map(g => {
    const chs = _buildAIChannels(allRecs);
    const r = _aiOptimize(chs, budget, g);
    return { goal: g, label: labels[g], result: r };
  });
}

      sumHTML+='<div class="budget-bar">';
      segs.forEach(s=>{sumHTML+='<div class="seg" style="width:'+Math.round(s.val/data.budget*100)+'%;background:'+s.color+';">'+s.label+Math.round(s.val/data.budget*100)+'%</div>';});
      sumHTML+='</div>';
    }
    sumHTML+='<div class="summary-row">';
    if(hasMix){
      if(data.socialBudget>0)sumHTML+='<div class="summary-item"><div class="num">$'+(data.socialBudget).toLocaleString()+'</div><div class="lbl">📣社交</div></div>';
      if(data.mfgBudget>0)sumHTML+='<div class="summary-item"><div class="num">$'+(data.mfgBudget).toLocaleString()+'</div><div class="lbl">📱厂商</div></div>';
      if(data.adnetBudget>0)sumHTML+='<div class="summary-item"><div class="num">$'+(data.adnetBudget).toLocaleString()+'</div><div class="lbl">🔗网盟</div></div>';
    }
    sumHTML+='<div class="summary-item"><div class="num">'+data.totalClicks.toLocaleString()+'</div><div class="lbl">月点击</div></div>'+
      '<div class="summary-item"><div class="num">'+data.totalUV.toLocaleString()+'</div><div class="lbl">月UV</div></div>'+
      '<div class="summary-item"><div class="num">'+data.totalLeads.toLocaleString()+'</div><div class="lbl">月线索</div></div>'+
      '</div></div>';
  }
  document.getElementById('resultSummary').innerHTML=sumHTML;

  let html='';
  recs.forEach((r)=>{
    if(r.noPlatform){
      html+='<div class="result-card"><div class="result-header"><span class="brand-name">'+(r.brand?.icon||'')+' '+(r.brand?.name||'')+'</span><span class="brand-match match-low">无可用</span></div>'+
        '<div class="result-body"><div class="advice-box" style="background:#fff3e0;color:#bf6d00;"><strong>⚠️ '+r.advice+'</strong></div></div></div>';
      return;
    }

    let label='推荐',cls='match-medium';
    if(r.info?.match==='top'||r.info?.match==='high'){label='强烈推荐';cls='match-top';}
    else if(r.channelType==='adnet'){label='网盟推荐';cls='match-medium';}

    let cplTag='';
    if(data.cplTarget&&r.cplSatisfies)cplTag=' <span style="font-size:11px;color:#27ae60;font-weight:600;">✓ CPL达标</span>';
    else if(data.cplTarget)cplTag=' <span style="font-size:11px;color:#e74c3c;font-weight:600;">CPL偏高</span>';

    const avgS=r.placements.reduce((s,p)=>s+p.score,0);
    const avgScores=r.placements.length>0?avgS/r.placements.length:0;
    const stars='⭐'.repeat(Math.min(Math.ceil(avgScores),5));

    if(r.placements.length>0){

      '</div>';

    if(r.allocatedBudget>0&&r.monthlyClicks>0){
      html+='<div class="result-section-title">📈 预算分配与预估</div>'+

        '<div class="cost-box green"><div class="label">分配预算</div><div class="value">$'+r.allocatedBudget.toLocaleString()+'</div><div class="sub">占'+(data.budget>0?Math.round(r.allocatedBudget/data.budget*100):0)+'%</div></div>'+

  document.getElementById('resultContent').innerHTML=html;
