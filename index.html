.tag.tag-biz.active-recruitment { background:#e74c3c; border-color:#e74c3c; color:#fff; }

.region-group { margin-top:4px; }
.region-tag { padding:7px 14px; border-radius:16px; border:1.5px solid #ddd; font-size:13px; background:#fff; color:#555; cursor:pointer; transition:all .2s; margin:3px; user-select:none; }

.input-group { margin-bottom:10px; }
.input-group label { display:block; font-size:13px; color:#666; margin-bottom:4px; font-weight:500; }
.input-group input { width:100%; padding:10px 14px; border:1.5px solid #e0e0e0; border-radius:10px; font-size:14px; outline:none; transition:border .2s; }

.input-hint { font-size:12px; color:#999; margin-top:4px; }

.btn-generate:active { transform:scale(.97); }

.result-card { background:#fff; border-radius:14px; margin-bottom:14px; box-shadow:0 2px 8px rgba(0,0,0,.06); overflow:hidden; }
.result-header { padding:14px 18px; border-bottom:1px solid #f0f0f0; display:flex; justify-content:space-between; align-items:center; }

.placement-name { color:#333; font-weight:500; }
.placement-score { color:#f39c12; font-size:12px; }

.cost-box .label { font-size:11px; color:#888; }

.ai-loading-dots span:nth-child(3) { animation-delay:.4s; }

    </div>
  </div>

  <div class="card">
    <div class="card-title">💰 成本目标设置</div>

      <label>广告点击成本目标 (CPC)</label>

    </div>
    <div class="input-group">

    </div>
    <div class="input-group">

  </div>

</div>

// ==================== UI交互 ====================
let selectedBiz=null,selectedRegion=null,selectedCountry=null,selectedChannel='all';

function selectBiz(el){
  document.querySelectorAll('.tag-biz').forEach(t=>t.classList.remove('active','active-recruitment','active-rental','active-2nd-ecom','active-2nd-car'));
  el.classList.add('active'); el.classList.add('active-'+el.dataset.biz);
  selectedBiz=el.dataset.biz; hideResult();
}
function selectChannelType(el){
  document.querySelectorAll('.channel-type-tag').forEach(t=>t.classList.remove('active','active-mfg','active-social','active-adnet','active-all'));
  el.classList.add('active'); el.classList.add('active-'+el.dataset.channel);
  selectedChannel=el.dataset.channel; hideResult();
}
function selectRegion(el){
  document.querySelectorAll('.region-tag').forEach(t=>t.classList.remove('active'));
  el.classList.add('active'); selectedRegion=el.dataset.region; selectedCountry=null;
  const t=COUNTRY_TIERS[selectedRegion]||'T3';
  document.getElementById('tierDisplay').textContent='【'+TIER_LABELS[t]+'】';
  const subDiv=document.getElementById('countrySubSelect'),subContainer=document.getElementById('subCountryTags');
  const region=REGION_DATA[selectedRegion];
  if(region&&region.countries.length>1){
    subContainer.innerHTML=region.countries.map(c=>'<span class="country-sub-tag" onclick="selectSubCountry(this,\''+c+'\')">'+c+'</span>').join('');
    subDiv.classList.add('show');
  }else{subDiv.classList.remove('show');if(region)selectedCountry=region.countries[0];}
  hideResult();
}
function selectSubCountry(el,c){
  document.querySelectorAll('.country-sub-tag').forEach(t=>t.classList.remove('active'));
  el.classList.add('active'); selectedCountry=c;
}
function hideResult(){var el=document.getElementById('resultSection');if(el)el.style.display='none';}

// ==================== 推荐引擎 ====================
function generate(){
  if(!selectedBiz||!selectedRegion){alert('请先选择业务类型和投放地区');return;}
  const btn=document.getElementById('genBtn');
  try {
    btn.disabled=true;btn.textContent='⏳ 分析中...';
    hideResult();
    const rsnEl = document.getElementById('aiReasoningPanel');
    if (rsnEl) rsnEl.style.display='none';

      var result = doGenerate();
    renderResult(result);
    document.getElementById('resultSection').style.display='block';
    document.getElementById('resultSection').scrollIntoView({behavior:'smooth',block:'start'});

    if (result.recommendations.length > 0) {

    }
  } catch(e) {

  }
  btn.disabled=false;btn.textContent='🚀 生成推荐方案';
}

      let pList=placements.slice(0,isBizPreferred?4:3);
      if(placements.length===0)pList=[]; // no placements
      const budgetLevel=budget>20000?'large':budget>5000?'medium':'small';
      let advice='';
      switch(key){
        case'xiaomi':advice='小米是'+(region.name||'')+'主流渠道，'+(budgetLevel==='large'?'建议签年度框架。':budgetLevel==='medium'?'聚焦核心城市。':'浏览器信息流起步。');break;
        case'oppo':advice='OPPO用户偏年轻化，推荐软件商店为核心。';break;
        case'vivo':advice='vivo优势明显，应用商店+Jovi场景组合。';break;
        case'transsion':advice='传音统治力覆盖，PalmStore必投。';break;

        case'huawei':advice='华为用户偏高端，推荐AppGallery+锁屏。';break;
        case'samsung':advice='三星预装强势，'+(biz==='2nd-ecom'?'商店分发配合云预装效果好。':'云预装CPI结算，数据以三星为准。');break;
        case'apple':advice='Apple Search Ads精准分发，仅限美英加澳，CPC搜索竞价。';break;
      }

    });

  if(showAdnet){

        case'pangle':advice='Pangle(TikTok联盟)，部分国家不支持，如美国。非游戏产品量有限。';break;
        case'applovin':advice='AppLovin机器学习驱动，非游戏有门槛需量级。全球覆盖但游戏为主。';break;
        case'unity':advice='Unity Ads游戏流量为主，短剧小说等非游产品也有量。拉美$0.4-0.8CPI。';break;

}

// ===== 预算自适应渠道数 =====
function _getTopN(budget) {
  if (budget <= 100000) return 4;           // ≤$100K: 3-4 渠道
  if (budget <= 500000) return 6;           // ≤$500K: 5-6 渠道
  return 10;                                 // >$500K: 最多 10 渠道
}

async function _runTop4Optimization(result) {
  var budget = parseFloat(document.getElementById('budget').value) || 0;
  var channelFilter = selectedChannel || 'all';
  if (budget <= 0) return;

  // 从推荐结果中筛选渠道
  var allRecs = result.recommendations.filter(function(r) {
    if (r.noPlatform) return false;
    if (channelFilter === 'social') return r.channelType === 'social';
    if (channelFilter === 'mfg') return r.channelType === 'mfg';
    if (channelFilter === 'adnet') return r.channelType === 'adnet';
    return true;
  });

  if (allRecs.length === 0) return;

  var topN = _getTopN(budget);

  // 计算每个渠道的线索效率：预算 / CPL = 预估线索数
  var scored = allRecs.map(function(r) {
    var cpl = r.leadCost || 999;
    var leadsPerDollar = 1 / cpl;
    var score = (r.score || 100) * leadsPerDollar;
    return { rec: r, score: score, leadsPerDollar: leadsPerDollar, cpl: cpl };
  });

  scored.sort(function(a, b) { return b.score - a.score; });

  // 自适应取 Top-N
  var topNchannels = scored.slice(0, Math.min(topN, scored.length));

  // 按线索效率比例分配预算
  var totalEfficiency = topNchannels.reduce(function(s, item) { return s + item.leadsPerDollar; }, 0);

  var allocs = topNchannels.map(function(item) {
    var pct = Math.round(item.leadsPerDollar / totalEfficiency * 100);
    var allocBudget = Math.round(pct * budget / 100);
    var monthlyLeads = Math.round(allocBudget / item.cpl);
    return {
      key: item.rec.key,
      name: item.rec.brand ? item.rec.brand.name : item.rec.key,
      budget: allocBudget,
      budgetPct: pct,
      cpl: item.cpl,
      monthlyLeads: monthlyLeads
    };
  });

  // 调整百分比使总和为100
  var totalPct = allocs.reduce(function(s, a) { return s + a.budgetPct; }, 0);
  if (allocs.length > 0 && totalPct !== 100) {
    allocs[0].budgetPct += (100 - totalPct);
    allocs[0].budget = Math.round(allocs[0].budgetPct * budget / 100);
  }

  // 构建 AI prompt 数据
  var channelSummary = allocs.map(function(a, i) {
    return (i+1) + '. ' + a.name + ': CPL $' + a.cpl.toFixed(2) + ', 预算 ' + a.budgetPct + '%($' + a.budget.toLocaleString() + '), 预估 ' + a.monthlyLeads.toLocaleString() + ' 条线索/月';
  }).join('\n');

  // 先模板渲染（即时展示）
  _renderOptimizationPanel(allocs, topN, budget, result.biz || selectedBiz, result.country || selectedRegion, channelFilter, null, null);

  // 异步调用 DeepSeek AI 增强
  try {
    var aiResult = await _callDeepSeekForAlloc(allocs, budget, result.biz || selectedBiz, result.country || selectedRegion, channelFilter, channelSummary);
    if (aiResult) {
      _renderOptimizationPanel(allocs, topN, budget, result.biz || selectedBiz, result.country || selectedRegion, channelFilter, aiResult.roiEstimates, aiResult.reasoning);
    }
  } catch(e) {
    console.log('DeepSeek AI enhancement failed (using template):', e.message);
  }
}

// ===== DeepSeek API 调用 =====
async function _callDeepSeekForAlloc(allocs, budget, biz, region, channelFilter, channelSummary) {
  var apiKey = _getDSKey();
  var prompt = '你是一位海外广告投放优化专家。以下是一个投放方案：\n\n' +
    '业务类型: ' + biz + '\n' +
    '目标地区: ' + region + '\n' +
    '渠道筛选: ' + (channelFilter === 'all' ? '全部渠道' : channelFilter) + '\n' +
    '总预算: $' + budget.toLocaleString() + '\n' +
    '渠道分配方案:\n' + channelSummary + '\n\n' +
    '请分析这个方案，给出：\n' +
    '1. 用中文简要评价预算分配的合理性（1-2句话）\n' +
    '2. 预估该组合的整体ROI范围（如 "1:2.5 ~ 1:4.0"）\n' +
    '3. 一句话优化建议\n\n' +
    '请严格按以下JSON格式回复：\n' +
    '{"roiRange": "预估ROI范围", "reasoning": "分析文字"}\n' +
    '只返回JSON，不要其他内容。';

  try {
    var resp = await fetch('https://api.deepseek.com/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
      body: JSON.stringify({
        model: 'deepseek-chat',
        messages: [{ role: 'user', content: prompt }],
        temperature: 0.7,
        max_tokens: 500
      })
    });

    if (!resp.ok) {
      var errText = await resp.text();
      console.log('DeepSeek API error:', resp.status, errText);
      return null;
    }

    var data = await resp.json();
    var content = data.choices?.[0]?.message?.content || '';

    // Parse JSON from response (may have markdown wrapping)
    var jsonStr = content.replace(/```json\n?|```|\n$/g, '').trim();
    var parsed = JSON.parse(jsonStr);
    return {
      roiEstimates: parsed.roiRange || '1:2.0 ~ 1:4.0',
      reasoning: parsed.reasoning || ''
    };
  } catch(e) {
    console.log('DeepSeek parse/generate fallback:', e.message);
    return null;
  }
}

function _aiCompare(allRecs, budget) {
  const goals = ['roi', 'cvr', 'brand'];
  const labels = { roi: 'ROI优先', cvr: '转化优先', brand: '曝光优先' };
  return goals.map(g => {
    const chs = _buildAIChannels(allRecs);
    const r = _aiOptimize(chs, budget, g);
    return { goal: g, label: labels[g], result: r };
  });
}

  if(data.totalClicks>0){
    sumHTML='<div class="summary-box total"><div style="font-weight:600;font-size:14px;">📊 总预算分配汇总 <span class="algomark">算法v2</span></div>';
    const hasMix=[data.socialBudget,data.mfgBudget,data.adnetBudget].filter(b=>b>0).length>1;
    if(hasMix){
      const segs=[];
      if(data.socialBudget>0)segs.push({label:'📣社交',val:data.socialBudget,color:'#3498db'});
      if(data.mfgBudget>0)segs.push({label:'📱厂商',val:data.mfgBudget,color:'#e74c3c'});
      if(data.adnetBudget>0)segs.push({label:'🔗网盟',val:data.adnetBudget,color:'#e67e22'});
      sumHTML+='<div class="budget-bar">';
      segs.forEach(s=>{sumHTML+='<div class="seg" style="width:'+Math.round(s.val/data.budget*100)+'%;background:'+s.color+';">'+s.label+Math.round(s.val/data.budget*100)+'%</div>';});
      sumHTML+='</div>';
    }
    sumHTML+='<div class="summary-row">';
    if(hasMix){
      if(data.socialBudget>0)sumHTML+='<div class="summary-item"><div class="num">$'+(data.socialBudget).toLocaleString()+'</div><div class="lbl">📣社交</div></div>';
      if(data.mfgBudget>0)sumHTML+='<div class="summary-item"><div class="num">$'+(data.mfgBudget).toLocaleString()+'</div><div class="lbl">📱厂商</div></div>';
      if(data.adnetBudget>0)sumHTML+='<div class="summary-item"><div class="num">$'+(data.adnetBudget).toLocaleString()+'</div><div class="lbl">🔗网盟</div></div>';
    }
    sumHTML+='<div class="summary-item"><div class="num">'+data.totalClicks.toLocaleString()+'</div><div class="lbl">月点击</div></div>'+
      '<div class="summary-item"><div class="num">'+data.totalUV.toLocaleString()+'</div><div class="lbl">月UV</div></div>'+
      '<div class="summary-item"><div class="num">'+data.totalLeads.toLocaleString()+'</div><div class="lbl">月线索</div></div>'+
      '</div></div>';
  }
  document.getElementById('resultSummary').innerHTML=sumHTML;

  let html='';
  recs.forEach((r)=>{
    if(r.noPlatform){
      html+='<div class="result-card"><div class="result-header"><span class="brand-name">'+(r.brand?.icon||'')+' '+(r.brand?.name||'')+'</span><span class="brand-match match-low">无可用</span></div>'+
        '<div class="result-body"><div class="advice-box" style="background:#fff3e0;color:#bf6d00;"><strong>⚠️ '+r.advice+'</strong></div></div></div>';
      return;
    }

    let label='推荐',cls='match-medium';
    if(r.info?.match==='top'||r.info?.match==='high'){label='强烈推荐';cls='match-top';}
    else if(r.channelType==='adnet'){label='网盟推荐';cls='match-medium';}

    let cplTag='';
    if(data.cplTarget&&r.cplSatisfies)cplTag=' <span style="font-size:11px;color:#27ae60;font-weight:600;">✓ CPL达标</span>';
    else if(data.cplTarget)cplTag=' <span style="font-size:11px;color:#e74c3c;font-weight:600;">CPL偏高</span>';

    const avgS=r.placements.reduce((s,p)=>s+p.score,0);
    const avgScores=r.placements.length>0?avgS/r.placements.length:0;
    const stars='⭐'.repeat(Math.min(Math.ceil(avgScores),5));
    const typeIcon=r.channelType==='social'?'📣':r.channelType==='mfg'?'📱':'🔗';

    html+='<div class="result-card"><div class="result-header">'+
      '<span class="brand-name">'+typeIcon+' '+(r.brand?.icon||'')+' '+(r.brand?.name||'')+'</span>'+
      '<span><span class="brand-match '+cls+'">'+label+'</span></span></div>'+
      '<div class="result-body">'+
      '<div style="font-size:12px;color:#888;margin-bottom:8px;">'+(r.brand?.platform||'')+' · '+(r.info?.rank||'')+' · '+(r.info?.share||'')+(r.info?.desc?' · '+r.info.desc:'')+'</div>';

    if(r.placements.length>0){
      html+='<div class="result-section-title">📌 推荐版位 '+stars+'</div>'+
        '<ul class="placement-list">'+r.placements.map(p=>'<li class="placement-item"><span class="placement-name">· '+p.name+'</span><span class="placement-score">'+'⭐'.repeat(p.score)+'</span></li>').join('')+'</ul>';
    }

    html+='<div class="result-section-title">💰 成本估算 <span class="data-badge">MAP参考</span></div>'+
      '<div class="cost-row">'+
      '<div class="cost-box"><div class="label">CPC</div><div class="value">'+r.cpcRange+'</div><div class="sub">/点击</div></div>'+
      '<div class="cost-box"><div class="label">UV</div><div class="value">$'+r.uvCost.toFixed(2)+'</div><div class="sub">/访客</div></div>'+
      '<div class="cost-box"><div class="label">CPL</div><div class="value">$'+r.leadCost.toFixed(2)+'</div><div class="sub">/线索'+cplTag+'</div></div>'+

      '</div>';

    if(r.allocatedBudget>0&&r.monthlyClicks>0){
      html+='<div class="result-section-title">📈 预算分配与预估</div>'+
        '<div class="cost-row">'+
        '<div class="cost-box green"><div class="label">分配预算</div><div class="value">$'+r.allocatedBudget.toLocaleString()+'</div><div class="sub">占'+(data.budget>0?Math.round(r.allocatedBudget/data.budget*100):0)+'%</div></div>'+
        '<div class="cost-box"><div class="label">月点击</div><div class="value">'+(r.monthlyClicks||0).toLocaleString()+'</div><div class="sub">次</div></div>'+
        '<div class="cost-box"><div class="label">日均UV</div><div class="value">'+(r.dailyUV||0).toLocaleString()+'</div><div class="sub">/天</div></div>'+
        '<div class="cost-box"><div class="label">月线索</div><div class="value">'+(r.monthlyLeads||0).toLocaleString()+'</div><div class="sub">条</div></div>'+
        '</div>';
    }

    if(r.score>0)html+='<div style="font-size:11px;color:#999;text-align:right;margin-top:4px;">算法评分: '+r.score.toFixed(1)+'</div>';
    html+='<div class="advice-box"><strong>🎯 投放建议</strong><br>'+r.advice+'</div></div></div>';
  });

  document.getElementById('resultContent').innerHTML=html;
}
</script>
</body>
</html>
