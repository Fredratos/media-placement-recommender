const BIZ_NAMES = { recruitment: '招聘', rental: '房租出租/出售', '2nd-ecom': '二手电商', '2nd-car': '二手车' };
const BIZ_ICONS = { recruitment: '💼', rental: '🏠', '2nd-ecom': '🛒', '2nd-car': '🚗' };
const BIZ_DESC = {
  recruitment: '需要大量下载转化+表单提交，适合应用商店搜索广告+信息流广覆盖',
  rental: 'LBS定向+本地化强曝光需求，适合系统级推送+场景化卡片投放',
  '2nd-ecom': '强依赖下载转化+平台信任建设，适合应用商店+浏览器组合投放',
  '2nd-car': '高客单价商品，需要品牌信任+精准人群触达，适合强曝光+搜索组合',
};

// ==================== 交互逻辑 ====================
let selectedBiz = null, selectedRegion = null, selectedCountry = null;

function selectBiz(el) {
  document.querySelectorAll('.tag-biz').forEach(t => { t.classList.remove('active', 'active-recruitment', 'active-rental', 'active-2nd-ecom', 'active-2nd-car'); });
  el.classList.add('active');
  el.classList.add('active-' + el.dataset.biz);
  selectedBiz = el.dataset.biz;
  document.getElementById('resultSection').style.display = 'none';
}

function selectRegion(el) {
  document.querySelectorAll('.region-tag').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  selectedRegion = el.dataset.region;
  selectedCountry = null;
  // 更新子国家选项
  const subDiv = document.getElementById('countrySubSelect');
  const subContainer = document.getElementById('subCountryTags');
  const region = REGION_DATA[selectedRegion];
  if (region && region.countries.length > 1) {
    subContainer.innerHTML = region.countries.map(c =>
      `<span class="country-sub-tag" onclick="selectSubCountry(this,'${c}')">${c}</span>`
    ).join('');
    subDiv.classList.add('show');
  } else {
    subDiv.classList.remove('show');
    if (region) selectedCountry = region.countries[0];
  }
  document.getElementById('resultSection').style.display = 'none';
}

function selectSubCountry(el, country) {
  document.querySelectorAll('.country-sub-tag').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  selectedCountry = country;
}

// ==================== 推荐引擎 ====================
function generate() {
  if (!selectedBiz || !selectedRegion) {
    alert('请先选择业务类型和投放地区');
    return;
  }

  const btn = document.getElementById('genBtn');
  btn.disabled = true;
  btn.textContent = '⏳ 正在分析...';
  document.getElementById('resultSection').style.display = 'none';

  setTimeout(() => {
    const result = doGenerate();
    renderResult(result);
    btn.disabled = false;
    btn.textContent = '🚀 生成推荐方案';
    document.getElementById('resultSection').style.display = 'block';
    document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 400);
}

function doGenerate() {
  const region = REGION_DATA[selectedRegion];
  const biz = selectedBiz;
  const costTarget = parseFloat(document.getElementById('costTarget').value) || null;
  const budget = parseFloat(document.getElementById('budget').value) || 0;

  // 判断是否为低覆盖市场（美国/澳洲/加拿大）
  const isLowCoverage = region.note && Object.values(region.brands).every(b => b.match === 'low');

  // 1. 按匹配度排序品牌
  const brandEntries = Object.entries(region.brands)
    .filter(([_, info]) => isLowCoverage || info.match !== 'low')
    .sort((a, b) => {
      const order = { high: 3, medium: 2, low: 1 };
      return order[b[1].match] - order[a[1].match];
    });

  // 2. 对每个品牌计算推荐版位
  const recommendations = brandEntries.map(([key, info]) => {
    const brand = BRANDS[key];
    const allPlacements = PLACEMENTS[key] || [];

    // 低覆盖市场特殊处理
    if (isLowCoverage && (info.match === 'low')) {
      return { key, brand, info, noPlatform: true, advice: region.note };
    }

    // 业务类型优先推荐版位
    const bizPreferred = (region.bizPlacements && region.bizPlacements[biz]) || [];
    let placements;
    if (bizPreferred.length > 0) {
      placements = allPlacements.filter(p =>
        bizPreferred.some(bp => p.name.includes(bp.replace(/[^\u4e00-\u9fa5a-zA-Z]/g, '').slice(0,4)))
      );
      if (placements.length === 0) placements = allPlacements.slice(0, 4);
    } else {
      placements = allPlacements.slice(0, 4);
    }

    // 过滤成本
    const regionCPI = region.cpi || { low: 0.2, high: 1.0 };
    if (costTarget && costTarget < regionCPI.low) {
      // 成本目标低于市场价 → 推荐更廉价渠道
      placements = placements.filter(p => p.score <= 4);
    }
    if (placements.length === 0) placements = allPlacements.slice(0, 2);

    // CPC 市场中间价
    const avgCpc = (regionCPI.low + regionCPI.high) / 2;
    // 网站UV预估成本 = CPC × 重复点击系数（约30%用户重复点击）
    const uvCost = avgCpc * 1.3;
    // 交易成本估算（业务类型相关）
    const bizCostMultiplier = { recruitment: 0.3, rental: 1.5, '2nd-ecom': 0.5, '2nd-car': 3.0 };
    const transactionCost = avgCpc * (bizCostMultiplier[biz] || 1);

    // 投放建议
    let advice = '';
    const budgetLevel = budget > 20000 ? 'large' : budget > 5000 ? 'medium' : 'small';
    switch (key) {
      case 'xiaomi':
        advice = `小米是${region.name}市场主流渠道，覆盖广、用户量大。推荐采用「应用商店搜索+浏览器信息流」组合投放，`;
        advice += budgetLevel === 'large' ? '适合大规模买量，建议签订年度框架争取返点。' : budgetLevel === 'medium' ? '建议聚焦核心城市精细化投放。' : '建议从浏览器信息流起步，控制测试预算。';
        break;
      case 'oppo':
        advice = `OPPO用户群体偏年轻化，在${region.name}市场与电商、社交类产品匹配度高。推荐以软件商店为核心，`;
        advice += biz === '2nd-ecom' ? '电商类产品可叠加OPPO广告联盟补充流量。' : '可叠加浏览器信息流扩大覆盖面。';
        break;
      case 'vivo':
        advice = `vivo在${region.name}市场线下优势领先，推荐「应用商店+Jovi场景」组合。`;
        advice += biz === 'rental' ? 'Jovi智慧场景的LBS能力精准匹配租房、本地服务类投放需求。' : 'Jovi场景化卡片有助于提升转化率。';
        break;
      case 'transsion':
        advice = `传音在${region.name}市场具有统治力覆盖，PalmStore是必投渠道。推荐采用「PalmStore搜索+Boomplay音乐」组合触达年轻用户，`;
        advice += budgetLevel === 'large' ? '建议争取系统级锁屏流量。' : '聚焦应用商店搜索广告控制成本。';
        break;
      case 'honor':
        advice = `荣耀在${region.name}正处于高速增长期，渠道成本相对较低。推荐优先布局应用商店和浏览器，`;
        advice += '当前窗口期适合提前锁定低价流量。建议与荣耀建立季度框架合作。';
        break;
      case 'huawei':
        advice = `华为在${region.name}市场处于恢复阶段，用户偏高端。推荐AppGallery+锁屏强曝光组合，`;
        advice += '适合品牌建设类投放而非纯效果买量。';
        break;
    }

    return {
      key, brand, info, placements,
      cpcRange: `$${regionCPI.low.toFixed(2)}-${regionCPI.high.toFixed(2)}`,
      avgCpc: avgCpc.toFixed(2),
      uvCost: uvCost.toFixed(2),
      transactionCost: transactionCost.toFixed(2),
      advice
    };
  });

  // 按匹配度+业务适配度排序
  const order = { high: 0, medium: 1, low: 2 };
  recommendations.sort((a, b) => order[a.info.match] - order[b.info.match]);

  return {
    region: region.name,
    country: selectedCountry || region.countries[0],
    biz: BIZ_NAMES[biz],
    bizIcon: BIZ_ICONS[biz],
    bizDesc: BIZ_DESC[biz],
    costTarget,
    budget,
    recommendations
  };
}

function renderResult(data) {
  const meta = document.getElementById('resultMeta');
  meta.textContent = `· ${data.bizIcon} ${data.biz} · ${data.country || data.region}`;

  let html = '';
  data.recommendations.forEach((r, idx) => {
    // 低覆盖市场 - 无厂商广告资源
    if (r.noPlatform) {
      html += `<div class="result-card">
        <div class="result-header">
          <span class="brand-name">${r.brand.icon} ${r.brand.name}</span>
          <span class="brand-match match-low">无可用</span>
        </div>
        <div class="result-body">
          <div style="font-size:12px;color:#888;margin-bottom:8px;">${r.info.rank} · ${r.info.share}份额 · ${r.info.desc}</div>
          <div class="advice-box" style="background:#fff3e0;color:#bf6d00;"><strong>⚠️ 无系统级广告资源</strong><br>${r.advice}</div>
        </div>
      </div>`;
      return;
    }

    const matchLabel = r.info.match === 'high' ? '强烈推荐' : (r.info.match === 'medium' ? '推荐' : '可选');
    const matchClass = r.info.match === 'high' ? 'match-high' : 'match-medium';
    const totalScore = r.placements.reduce((s,p)=>s+p.score,0);
    const avgScore = r.placements.length > 0 ? totalScore / r.placements.length : 0;
    const stars = '⭐'.repeat(Math.min(Math.ceil(avgScore), 5));

    html += `<div class="result-card">
      <div class="result-header">
        <span class="brand-name">${r.brand.icon} ${r.brand.name}</span>
        <span class="brand-match ${matchClass}">${matchLabel}</span>
      </div>
      <div class="result-body">
        <div style="font-size:12px;color:#888;margin-bottom:8px;">
          ${r.brand.platform} · ${r.info.rank} · ${r.info.share}份额 · ${r.info.desc}
        </div>
        <div class="result-section-title">📌 推荐资源版位 ${stars}</div>
        <ul class="placement-list">
          ${r.placements.map(p => `<li class="placement-item"><span class="placement-name">· ${p.name}</span><span class="placement-score">${'⭐'.repeat(p.score)}</span></li>`).join('')}
        </ul>
        <div class="result-section-title">💰 成本估算</div>
        <div class="cost-row">
          <div class="cost-box"><div class="label">CPC成本</div><div class="value">${r.cpcRange}</div><div class="sub">/次点击</div></div>
          <div class="cost-box"><div class="label">网站UV预估成本</div><div class="value">$${r.uvCost}</div><div class="sub">/独立访客</div></div>
          <div class="cost-box"><div class="label">转化成本</div><div class="value">$${r.transactionCost}</div><div class="sub">/笔订单或线索</div></div>
        </div>
        <div class="advice-box"><strong>🎯 投放建议</strong><br>${r.advice}</div>
      </div>
    </div>`;
  });

  document.getElementById('resultContent').innerHTML = html;
}
